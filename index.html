<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HCB Eventos</title>
  <meta name="description" content="HCB Eventos — página institucional em construção." />
  <meta property="og:title" content="HCB Eventos" />
  <meta property="og:description" content="Página institucional em construção." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://urso71.com" />
  <style>
    :root { --bg:#0b1220; --text:#f8fafc; --muted:#cbd5e1; --accent:#e7c85f; --line:rgba(255,255,255,.14); }
    * { box-sizing: border-box; }
    body {
      margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
      padding:28px; font-family:Arial, Helvetica, sans-serif; color:var(--text);
      background:linear-gradient(135deg,#08111f,#111827 58%,#1f2937);
    }
    main { width:min(760px,100%); border:1px solid var(--line); border-radius:24px; padding:42px; background:rgba(15,23,42,.82); box-shadow:0 24px 80px rgba(0,0,0,.28); }
    .eyebrow { color:var(--accent); text-transform:uppercase; letter-spacing:.18em; font-size:13px; font-weight:800; margin-bottom:18px; }
    h1 { margin:0; font-size:clamp(44px,8vw,76px); line-height:.95; letter-spacing:-.05em; }
    p { color:var(--muted); font-size:19px; line-height:1.6; margin:26px 0 0; max-width:620px; }
    .contact { margin-top:30px; padding-top:24px; border-top:1px solid var(--line); color:var(--muted); }
    a { color:var(--accent); text-decoration:none; font-weight:700; }
  </style>
</head>
<body>
  <main>
    <div class="eyebrow">Página institucional</div>
    <h1>HCB Eventos</h1>
    <p>
      Site em construção. Em breve, este endereço reunirá informações institucionais e canais de contato.
    </p>
    <div class="contact">
      Contato: <a href="mailto:henrique.baez@urso71.com">henrique.baez@urso71.com</a>
    </div>
  </main>
</body>
</html>
